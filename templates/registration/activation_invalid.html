{% extends 'base.html' %}
{% block content %}
<div class="container" style="margin-top: 50px; margin-bottom: 50px;">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="alert alert-danger">
                <h2 class="alert-heading">Activation Link Invalid</h2>
                <p>
                    Sorry, the activation link you clicked is either invalid or has already expired. 
                </p>
            </div>
            <p>Links are unique and can only be used once to activate an account.</p>
            <div class="mt-4">
                <a href="{% url 'signup' %}" class="btn btn-primary">Try Registering Again</a>
                <a href="{% url 'home' %}" class="btn btn-link">Visit Store</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
